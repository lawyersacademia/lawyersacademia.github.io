<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Legal Assistant – Lawyers Academia</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@1,400;0,600&display=swap" rel="stylesheet">
    <style>
        :root {
            --green: #004d2c;
            --green-dark: #003520;
            --gold: #c5a059;
            --gold-light: #f5efdf;
            --text: #2a2a2a;
            --muted: #777;
            --border: #e4e0d8;
            --white: #ffffff;
            --bg: #f7f6f2;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .topbar {
            background: var(--green);
            height: 62px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            flex-shrink: 0;
        }
        .topbar-left { display: flex; align-items: center; gap: 14px; }
        .back-btn {
            color: rgba(255,255,255,0.75);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 7px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .back-btn:hover { color: var(--gold); }
        .top-divider { width: 1px; height: 22px; background: rgba(255,255,255,0.2); }
        .topbar-brand { display: flex; align-items: center; gap: 10px; }
        .ai-dot {
            width: 9px;
            height: 9px;
            background: #4ade80;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 3px rgba(74,222,128,0.2); }
            50% { box-shadow: 0 0 0 6px rgba(74,222,128,0.08); }
        }
        .topbar-title { color: white; font-size: 1.1rem; font-weight: 700; }
        .new-chat-btn {
            background: rgba(255,255,255,0.12);
            color: var(--gold);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
        }
        .chat-container { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .messages { flex: 1; overflow-y: auto; padding: 20px; }
        .welcome-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            text-align: center;
        }
        .welcome-icon { font-size: 4rem; color: var(--gold); margin-bottom: 20px; }
        .welcome-title { font-size: 1.8rem; font-weight: 700; color: var(--green); margin-bottom: 10px; }
        .welcome-subtitle { font-size: 1rem; color: var(--muted); margin-bottom: 30px; max-width: 500px; }
        .suggestion-chips {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
            margin-top: 20px;
        }
        .chip {
            background: white;
            border: 1.5px solid var(--border);
            padding: 12px 16px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .chip:hover { border-color: var(--gold); background: var(--gold-light); transform: translateY(-2px); }
        .message { margin-bottom: 16px; display: flex; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        .message.user { justify-content: flex-end; }
        .message-bubble {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 14px;
            word-wrap: break-word;
            line-height: 1.5;
            font-size: 0.95rem;
        }
        .message.user .message-bubble { background: var(--green); color: white; border-radius: 14px 4px 14px 14px; }
        .message.ai .message-bubble { background: white; color: var(--text); border: 1px solid var(--border); border-radius: 4px 14px 14px 14px; }
        .section-badge {
            display: inline-block;
            background: var(--gold);
            color: var(--green);
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 700;
            font-size: 0.85rem;
            margin: 0 2px;
        }
        .typing-bubble { display: flex; gap: 4px; align-items: center; padding: 12px 16px; background: white; border: 1px solid var(--border); border-radius: 4px 14px 14px 14px; }
        .typing-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); animation: typing 1.4s infinite; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing { 0%, 60%, 100% { opacity: 0.3; } 30% { opacity: 1; } }
        .error-bubble { background: #fee; border: 1px solid #fcc; border-radius: 4px 14px 14px 14px; color: #c33; padding: 12px 16px; }
        .input-area { padding: 16px 20px; background: white; border-top: 1px solid var(--border); flex-shrink: 0; }
        .input-wrapper { display: flex; gap: 10px; align-items: flex-end; }
        #userInput {
            flex: 1;
            padding: 12px 14px;
            border: 1px solid var(--border);
            border-radius: 20px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.95rem;
            resize: none;
            max-height: 120px;
            outline: none;
        }
        #userInput:focus { border-color: var(--gold); }
        .send-btn {
            background: var(--green);
            color: white;
            border: none;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.1rem;
        }
        .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .disclaimer { font-size: 0.75rem; color: var(--muted); text-align: center; margin-top: 8px; }
        .api-badge {
            display: inline-block;
            font-size: 0.65rem;
            background: var(--gold-light);
            color: var(--green);
            border: 1px solid var(--gold);
            padding: 1px 6px;
            border-radius: 10px;
            margin-left: 6px;
            vertical-align: middle;
            font-weight: 600;
        }
        @media (max-width: 480px) { .message-bubble { max-width: 95%; } .suggestion-chips { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="topbar">
        <div class="topbar-left">
            <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i><span>Back</span></a>
            <div class="top-divider"></div>
        </div>
        <div class="topbar-brand">
            <div class="ai-dot"></div>
            <div class="topbar-title">AI Legal Assistant</div>
        </div>
        <div class="topbar-right">
            <button class="new-chat-btn" onclick="clearChat()"><i class="fas fa-plus"></i> New Chat</button>
        </div>
    </div>

    <div class="chat-container">
        <div class="messages" id="messages">
            <div class="welcome-screen" id="welcomeScreen">
                <div class="welcome-icon">⚖️</div>
                <div class="welcome-title">Welcome to AI Legal Assistant</div>
                <div class="welcome-subtitle">Ask any question about Pakistani law, courts, acts, legal procedures, or LLB curriculum. 100% Free!</div>
                <div class="suggestion-chips">
                    <div class="chip" onclick="sendSuggestion('What is contract law under the Contract Act 1872?')"><i class="fas fa-file-contract"></i> Contract Law</div>
                    <div class="chip" onclick="sendSuggestion('Explain criminal procedure under CrPC in Pakistan')"><i class="fas fa-gavel"></i> Criminal Law</div>
                    <div class="chip" onclick="sendSuggestion('What are the fundamentals in the Constitution 1973?')"><i class="fas fa-landmark"></i> Constitution</div>
                    <div class="chip" onclick="sendSuggestion('How to file a case in District Court?')"><i class="fas fa-scale-balanced"></i> Court Procedure</div>
                </div>
            </div>
        </div>
    </div>

    <div class="input-area">
        <div class="input-wrapper">
            <textarea id="userInput" placeholder="Ask any law question..." onkeypress="handleKey(event)" oninput="adjustTextareaHeight()" style="height: 42px;"></textarea>
            <button class="send-btn" id="sendBtn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
        </div>
        <div class="disclaimer" id="disclaimer">✓ Powered by AI | ✓ Verify answers from official sources</div>
    </div>

    <script>
        const SYSTEM_PROMPT = `You are an expert Pakistani law assistant and LLB professor. Your role is to:
1. Answer questions about Pakistani law with absolute accuracy
2. Reference Acts: Contract Act 1872, Code of Civil Procedure (CPC), Criminal Procedure Code (CrPC), Pakistan Penal Code (PPC), Constitution 1973, etc.
3. Explain legal concepts, court procedures, and case law
4. Provide citations in format: 'Section X of [Act Name]'
5. Include a disclaimer: '⚠️ Verify from official textbooks and courts'

For each answer:
- Start with the relevant section number in bold (use **bold text**)
- Explain the concept in simple Urdu-English mix if needed
- Provide real examples from Pakistani law
- Always end with 'Verify from: [official source]'

Keep answers detailed but accessible. Use bullet points for procedures.`;

        // ============================================================
        // API CONFIGURATIONS — Fallback Chain (tries in order)
        // ============================================================
        const AI_APIS = [
            {
                name: "Gemini",
                call: async (message, history) => {
                    const API_KEY = 'AIzaSyB1LdVaFJxFw-j7My_KUIcUk_2STrDyOP0';
                    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${API_KEY}`;
                    const contents = [];
                    contents.push({ role: 'user', parts: [{ text: SYSTEM_PROMPT }] });
                    contents.push({ role: 'model', parts: [{ text: 'Understood. I am your expert Pakistani law assistant. Ask your question.' }] });
                    const recent = history.slice(-20);
                    for (const msg of recent) {
                        contents.push({ role: msg.role === 'user' ? 'user' : 'model', parts: [{ text: msg.content }] });
                    }
                    contents.push({ role: 'user', parts: [{ text: message }] });
                    const res = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents, generationConfig: { temperature: 0.7, maxOutputTokens: 1500 } })
                    });
                    if (!res.ok) {
                        const err = await res.json().catch(() => ({}));
                        throw new Error(err.error?.message || `HTTP ${res.status}`);
                    }
                    const data = await res.json();
                    const reply = data?.candidates?.[0]?.content?.parts?.[0]?.text;
                    if (!reply) throw new Error('No response');
                    return reply;
                }
            },
            {
                name: "Groq",
                call: async (message, history) => {
                    const API_KEY = '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';
                    const messages = [{ role: 'system', content: SYSTEM_PROMPT }];
                    const recent = history.slice(-20);
                    for (const msg of recent) {
                        messages.push({ role: msg.role === 'user' ? 'user' : 'assistant', content: msg.content });
                    }
                    messages.push({ role: 'user', content: message });
                    const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${API_KEY}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ model: 'llama3-8b-8192', messages, max_tokens: 1500, temperature: 0.7 })
                    });
                    if (!res.ok) {
                        const err = await res.json().catch(() => ({}));
                        throw new Error(err.error?.message || `HTTP ${res.status}`);
                    }
                    const data = await res.json();
                    const reply = data?.choices?.[0]?.message?.content;
                    if (!reply) throw new Error('No response');
                    return reply;
                }
            },
            {
                name: "Mistral",
                call: async (message, history) => {
                    const API_KEY = 'IPVbY0xPjoUC929dUge3wEVxOsiJZnxu';
                    const messages = [{ role: 'system', content: SYSTEM_PROMPT }];
                    const recent = history.slice(-20);
                    for (const msg of recent) {
                        messages.push({ role: msg.role === 'user' ? 'user' : 'assistant', content: msg.content });
                    }
                    messages.push({ role: 'user', content: message });
                    const res = await fetch('https://api.mistral.ai/v1/chat/completions', {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${API_KEY}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ model: 'mistral-small-latest', messages, max_tokens: 1500, temperature: 0.7 })
                    });
                    if (!res.ok) {
                        const err = await res.json().catch(() => ({}));
                        throw new Error(err.error?.message || `HTTP ${res.status}`);
                    }
                    const data = await res.json();
                    const reply = data?.choices?.[0]?.message?.content;
                    if (!reply) throw new Error('No response');
                    return reply;
                }
            },
            {
                name: "OpenRouter",
                call: async (message, history) => {
                    const API_KEY = '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';
                    const messages = [{ role: 'system', content: SYSTEM_PROMPT }];
                    const recent = history.slice(-20);
                    for (const msg of recent) {
                        messages.push({ role: msg.role === 'user' ? 'user' : 'assistant', content: msg.content });
                    }
                    messages.push({ role: 'user', content: message });
                    const res = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${API_KEY}`,
                            'Content-Type': 'application/json',
                            'HTTP-Referer': 'https://lawyersacademia.great-site.net',
                            'X-Title': 'AI Legal Assistant'
                        },
                        body: JSON.stringify({ model: 'mistralai/mistral-7b-instruct:free', messages, max_tokens: 1500, temperature: 0.7 })
                    });
                    if (!res.ok) {
                        const err = await res.json().catch(() => ({}));
                        throw new Error(err.error?.message || `HTTP ${res.status}`);
                    }
                    const data = await res.json();
                    const reply = data?.choices?.[0]?.message?.content;
                    if (!reply) throw new Error('No response');
                    return reply;
                }
            }
        ];

        // ============================================================
        // MAIN FALLBACK FUNCTION — tries each API in order
        // ============================================================
        async function askAI(message, history) {
            let lastError = '';
            for (const api of AI_APIS) {
                try {
                    console.log(`Trying ${api.name}...`);
                    const reply = await api.call(message, history);
                    updateDisclaimer(api.name);
                    return reply;
                } catch (err) {
                    console.warn(`${api.name} failed:`, err.message);
                    lastError = err.message;
                    continue;
                }
            }
            throw new Error('All AI services are currently unavailable. Please try again later.');
        }

        function updateDisclaimer(apiName) {
            const el = document.getElementById('disclaimer');
            if (el) el.innerHTML = `✓ Powered by <strong>${apiName}</strong> AI | ✓ Verify answers from official sources`;
        }

        // ============================================================
        // CHAT UI FUNCTIONS
        // ============================================================
        let chatHistory = [];
        let isLoading = false;

        function appendMessage(role, text) {
            const messages = document.getElementById('messages');
            const msg = document.createElement('div');
            msg.className = `message ${role}`;
            let processed = text.replace(/Section\s+(\d+[A-Za-z]*)\s+of\s+([A-Za-z0-9 ]+)/gi, '<span class="section-badge">§$1 $2</span>');
            processed = processed.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>');
            msg.innerHTML = `<div class="message-bubble">${processed}</div>`;
            messages.appendChild(msg);
            messages.scrollTop = messages.scrollHeight;
        }

        function appendError(text) {
            const messages = document.getElementById('messages');
            const msg = document.createElement('div');
            msg.className = 'message ai';
            msg.innerHTML = `<div class="message-bubble error-bubble">❌ ${text}</div>`;
            messages.appendChild(msg);
            messages.scrollTop = messages.scrollHeight;
        }

        function showTyping() {
            const messages = document.getElementById('messages');
            const typing = document.createElement('div');
            typing.className = 'message ai';
            typing.id = 'typing-' + Date.now();
            typing.innerHTML = `<div class="typing-bubble"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;
            messages.appendChild(typing);
            messages.scrollTop = messages.scrollHeight;
            return typing.id;
        }

        function removeTyping(id) { const el = document.getElementById(id); if (el) el.remove(); }
        function setLoading(state) { isLoading = state; document.getElementById('sendBtn').disabled = state; }
        function adjustTextareaHeight() { const ta = document.getElementById('userInput'); ta.style.height = 'auto'; ta.style.height = Math.min(ta.scrollHeight, 120) + 'px'; }
        function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
        function sendSuggestion(text) { document.getElementById('userInput').value = text; sendMessage(); }

        function clearChat() {
            chatHistory = [];
            const messages = document.getElementById('messages');
            const welcome = document.getElementById('welcomeScreen');
            if (messages) { while (messages.children.length > 1) messages.removeChild(messages.lastChild); }
            if (welcome) welcome.style.display = 'flex';
            updateDisclaimer('AI');
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text || isLoading) return;

            document.getElementById('welcomeScreen').style.display = 'none';
            input.value = '';
            input.style.height = 'auto';

            appendMessage('user', text);
            chatHistory.push({ role: 'user', content: text });

            const typingId = showTyping();
            setLoading(true);

            try {
                const reply = await askAI(text, chatHistory);
                removeTyping(typingId);
                chatHistory.push({ role: 'assistant', content: reply });
                if (chatHistory.length > 40) chatHistory = chatHistory.slice(-40);
                appendMessage('ai', reply);
            } catch (err) {
                removeTyping(typingId);
                appendError(err.message);
            } finally {
                setLoading(false);
            }
        }
    </script>
</body>
</html>
